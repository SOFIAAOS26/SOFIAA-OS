<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Gradiente izquierda (rosa → lila) -->
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <!-- Gradiente derecha (lila → azul) -->
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <!-- Gradiente aurora completo -->
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="50%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <!-- Orb radial -->
    <radialGradient id="orbGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="55%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </radialGradient>
  </defs>

  <!-- Arco exterior izquierdo (rosa) -->
  <path d="M 100 14 A 86 86 0 0 0 100 186"
        stroke="url(#pinkGrad)" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Arco exterior derecho (azul) -->
  <path d="M 100 14 A 86 86 0 0 1 100 186"
        stroke="url(#blueGrad)" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Arco interior izquierdo — bracket pink -->
  <path d="M 100 56 A 30 30 0 0 0 100 144"
        stroke="url(#pinkGrad)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Arco interior derecho — bracket azul -->
  <path d="M 100 56 A 30 30 0 0 1 100 144"
        stroke="url(#blueGrad)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Eje vertical superior (une arco exterior con bracket) -->
  <line x1="100" y1="14" x2="100" y2="56"
        stroke="url(#aurora)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eje vertical inferior -->
  <line x1="100" y1="144" x2="100" y2="186"
        stroke="url(#aurora)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Orbe central — el núcleo -->
  <circle cx="100" cy="100" r="17" fill="url(#orbGrad)"/>
</svg>
