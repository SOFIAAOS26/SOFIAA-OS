<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N.E.X.O.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 200px;
      background: #0F0B1E;
      color: #E2D9F3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(168,85,247,0.15);
    }
    .logo {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 0 6px rgba(168,85,247,0.6));
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(90deg, #F472B6, #A855F7, #60A5FA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.04em;
    }
    .header-badge {
      margin-left: auto;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: rgba(168,85,247,0.15);
      color: #A855F7;
      border: 1px solid rgba(168,85,247,0.3);
      letter-spacing: 0.06em;
    }

    /* ── Login screen ─────────────────────────── */
    #screen-login {
      padding: 28px 20px;
      text-align: center;
    }
    #screen-login .subtitle {
      color: rgba(226,217,243,0.55);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(168,85,247,0.35);
      background: rgba(168,85,247,0.08);
      color: #E2D9F3;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-google:hover { background: rgba(168,85,247,0.18); }
    .btn-google:disabled { opacity: 0.45; cursor: default; }
    .btn-google svg { flex-shrink: 0; }

    /* ── Capture screen ───────────────────────── */
    #screen-capture { padding: 0; }

    .page-info {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(168,85,247,0.1);
    }
    .page-title {
      font-size: 12px;
      font-weight: 600;
      color: #E2D9F3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .page-url {
      font-size: 11px;
      color: rgba(226,217,243,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selected-preview {
      margin: 10px 16px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(96,165,250,0.08);
      border: 1px solid rgba(96,165,250,0.2);
      font-size: 11px;
      color: rgba(226,217,243,0.7);
      font-style: italic;
      max-height: 56px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .selected-label {
      font-size: 10px;
      color: #60A5FA;
      font-style: normal;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .note-area {
      margin: 0 16px 12px;
    }
    .note-area textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(168,85,247,0.2);
      background: rgba(168,85,247,0.05);
      color: #E2D9F3;
      font-size: 12px;
      resize: none;
      height: 54px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .note-area textarea::placeholder { color: rgba(226,217,243,0.3); }
    .note-area textarea:focus { border-color: rgba(168,85,247,0.5); }

    .actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 14px;
    }
    .btn-capture {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #F472B6, #A855F7);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn-capture:hover { opacity: 0.88; }
    .btn-capture:active { transform: scale(0.97); }
    .btn-capture:disabled { opacity: 0.4; cursor: default; }

    /* ── Success state ────────────────────────── */
    #screen-success {
      padding: 28px 20px;
      text-align: center;
    }
    .success-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .success-title {
      font-size: 15px;
      font-weight: 700;
      color: #A855F7;
      margin-bottom: 6px;
    }
    .success-sub {
      font-size: 12px;
      color: rgba(226,217,243,0.5);
      line-height: 1.5;
    }
    .success-category {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      font-size: 11px;
      color: #A855F7;
      letter-spacing: 0.04em;
    }

    /* ── Footer user ──────────────────────────── */
    .footer-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-top: 1px solid rgba(168,85,247,0.1);
    }
    .user-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(168,85,247,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-email {
      font-size: 11px;
      color: rgba(226,217,243,0.4);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-logout {
      font-size: 10px;
      color: rgba(226,217,243,0.3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    .btn-logout:hover { color: #F472B6; }

    /* ── Toast/Error ─────────────────────────── */
    .toast {
      margin: 0 16px 10px;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 11px;
      display: none;
    }
    .toast.error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #F87171;
      display: block;
    }
    .toast.info {
      background: rgba(168,85,247,0.08);
      border: 1px solid rgba(168,85,247,0.2);
      color: rgba(226,217,243,0.6);
      display: block;
    }

    /* ── Spinner ─────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img class="logo" src="../icons/icon-48.png" alt="N.E.X.O." />
    <span class="header-title">N.E.X.O.</span>
    <span class="header-badge">SOFIAA</span>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="screen-login">
    <p class="subtitle">Inicia sesión para capturar<br/>contexto en tu grafo de memoria.</p>
    <button class="btn-google" id="btn-login">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.108 17.64 11.84 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </button>
  </div>

  <!-- CAPTURE SCREEN -->
  <div id="screen-capture" class="hidden">
    <div class="page-info">
      <div class="page-title" id="page-title">Cargando...</div>
      <div class="page-url"  id="page-url"></div>
    </div>

    <div id="selected-preview" class="selected-preview hidden">
      <div class="selected-label">TEXTO SELECCIONADO</div>
      <span id="selected-text"></span>
    </div>

    <div id="toast" class="toast"></div>

    <div class="note-area">
      <textarea id="note-input" placeholder="Añade una nota (opcional)..."></textarea>
    </div>

    <div class="actions">
      <button class="btn-capture" id="btn-capture">⚡ Capturar</button>
    </div>

    <div class="footer-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-email" id="user-email">–</span>
      <button class="btn-logout" id="btn-logout">Salir</button>
    </div>
  </div>

  <!-- SUCCESS SCREEN -->
  <div id="screen-success" class="hidden">
    <div class="success-icon">⚡</div>
    <div class="success-title">¡Capturado!</div>
    <div class="success-sub" id="success-sub">SOFIAA ha guardado este contexto<br/>en tu grafo de memoria.</div>
    <div class="success-category" id="success-category">otro</div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
